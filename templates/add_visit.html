# The following function was generated with help from ChatGPT because I don't really understand HTML 
# and I wanted to be able to add users and items from button presses
<!doctype html>
<html lang="en">
  <head>
    <title>Add Visit</title>
    <script>
        let personIndex = 0;
        function addPerson() {
            const container = document.getElementById("people-container");
            const personDiv = document.createElement("div");
            personDiv.className = "person-block";
            personDiv.innerHTML = `
                <h4>Person ${personIndex + 1}</h4>
                <input type="text" name="people[${personIndex}][name]" placeholder="Name">
                <div id="items-${personIndex}"></div>
                <button type="button" onclick="addItem(${personIndex})">Add Item</button>
                <hr>
            `;
            container.appendChild(personDiv);
            personIndex++;
        }
        function addItem(personIdx) {
            const itemsDiv = document.getElementById(`items-${personIdx}`);
            const itemCount = itemsDiv.children.length;
            const itemHTML = `
                <div>
                    <input type="text" name="people[${personIdx}][items][${itemCount}][item_name]" placeholder="Item">
                    <input type="number" name="people[${personIdx}][items][${itemCount}][rating]" placeholder="Rating">
                </div>
            `;
            itemsDiv.insertAdjacentHTML("beforeend", itemHTML);
        }
    </script>
</head>
<body>
<h2>Add Visit</h2>
<form method="POST" action="/add_visit">
    <input type="text" name="restaurant_name" placeholder="Restaurant Name">
    <input type="number" step="0.01" name="total_spent" placeholder="Total Bill">
    <input type="number" step="0.01" name="rating" placeholder="Rating out of 10">
    <div id="people-container"></div>
    <button type="button" onclick="addPerson()">Add Person</button>
    <br><br>
    <button type="submit">Submit</button>
</form>
</body>
</html>
