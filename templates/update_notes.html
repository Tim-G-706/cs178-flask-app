<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Notes</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2>Update Notes</h2>

    <!-- Search Form -->
    <form method="POST" action="/update-notes">
        <!--  The following function was generated with help from ChatGPT because I don't really understand HTML 
        # and I wanted to be able to have a drop down selection menu
        -->
        <select class="form-control" name="Restaurant">
            <option value="">Select a restaurant</option>
            {% for r in restaurant_names %}
                <option value="{{ r.name }}">{{ r.name }}</option>
            {% endfor %}
        </select>
        <br><br>
        <input type="text" name="notes" placeholder="Notes">
        <br><br>
        <button type="submit">Submit</button>
    </form>
</div>
</body>
</html>
